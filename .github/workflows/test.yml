name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Run shellcheck
        run: shellcheck -s bash entrypoint.sh

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats-core
        run: git clone --depth 1 https://github.com/bats-core/bats-core.git tests/bats
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
      - name: Run unit tests
        run: tests/bats/bin/bats tests/test_*.bats

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t agent-container .
