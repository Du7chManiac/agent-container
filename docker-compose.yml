services:
  opencode:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${SSH_PORT:-2222}:22"
    env_file:
      - .env
    volumes:
      - coder-home:/home/coder
      - ssh-host-keys:/etc/ssh/host_keys
    networks:
      - dokploy-network

volumes:
  coder-home:
  ssh-host-keys:

networks:
  dokploy-network:
    external: true
